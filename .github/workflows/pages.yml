# Deploy VitePress site to GitHub Pages
name: Deploy VitePress to GitHub Pages

on:
  # Runs on pushes targeting the `main` branch
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Reuse dist directory
        run: mkdir -vp dist
        continue-on-error: true

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Build documentation
        run: npm run docs:build

      - name: Copy coverage report
        run: cp -r coverage docs/.vitepress/dist/coverage || true
        continue-on-error: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Lighthouse CI for performance monitoring
  lighthouse:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Audit with Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            https://lessup.github.io/gpu-fft/
            https://lessup.github.io/gpu-fft/guide/quick-start
            https://lessup.github.io/gpu-fft/api/
          budgetPath: ./budget.json
          uploadArtifacts: true
          temporaryPublicStorage: true
        continue-on-error: true
