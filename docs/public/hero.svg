<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="320" fill="url(#bgGrad)"/>

  <!-- Grid lines -->
  <g stroke="#4f46e5" stroke-width="0.5" opacity="0.3">
    <line x1="0" y1="80" x2="480" y2="80"/>
    <line x1="0" y1="160" x2="480" y2="160"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
    <line x1="120" y1="0" x2="120" y2="320"/>
    <line x1="240" y1="0" x2="240" y2="320"/>
    <line x1="360" y1="0" x2="360" y2="320"/>
  </g>

  <!-- FFT Wave visualization -->
  <g filter="url(#glow)">
    <path d="M40,160 Q80,100 120,160 T200,160 T280,160 T360,160 T440,160"
          fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.8"/>
    <path d="M40,160 Q80,220 120,160 T200,160 T280,160 T360,160 T440,160"
          fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Frequency bars -->
  <g fill="url(#accentGrad)" opacity="0.7">
    <rect x="60" y="180" width="20" height="40" rx="2"/>
    <rect x="90" y="150" width="20" height="70" rx="2"/>
    <rect x="120" y="120" width="20" height="100" rx="2"/>
    <rect x="150" y="140" width="20" height="80" rx="2"/>
    <rect x="180" y="170" width="20" height="50" rx="2"/>
    <rect x="210" y="130" width="20" height="90" rx="2"/>
    <rect x="240" y="110" width="20" height="110" rx="2"/>
    <rect x="270" y="150" width="20" height="70" rx="2"/>
    <rect x="300" y="160" width="20" height="60" rx="2"/>
    <rect x="330" y="145" width="20" height="75" rx="2"/>
    <rect x="360" y="175" width="20" height="45" rx="2"/>
    <rect x="390" y="190" width="20" height="30" rx="2"/>
  </g>

  <!-- Title -->
  <text x="240" y="60" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="bold" fill="white" text-anchor="middle">WebGPU FFT</text>
  <text x="240" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#a78bfa" text-anchor="middle">GPU-Accelerated Fourier Transform</text>

  <!-- GPU Chip icon -->
  <g transform="translate(420, 30)">
    <rect x="0" y="0" width="40" height="30" rx="4" fill="#4f46e5" opacity="0.8"/>
    <rect x="5" y="5" width="30" height="20" rx="2" fill="#1e1b4b"/>
    <circle cx="20" cy="15" r="6" fill="url(#accentGrad)"/>
  </g>
</svg>
