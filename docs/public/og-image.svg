<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Grid pattern -->
  <g stroke="#4f46e5" stroke-width="1" opacity="0.2">
    <line x1="0" y1="157.5" x2="1200" y2="157.5"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="472.5" x2="1200" y2="472.5"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
  </g>

  <!-- FFT Wave visualization -->
  <g filter="url(#glow)" transform="translate(0, 50)">
    <path d="M100,350 Q200,250 300,350 T500,350 T700,350 T900,350 T1100,350"
          fill="none" stroke="url(#accentGrad)" stroke-width="6" opacity="0.8"/>
    <path d="M100,350 Q200,450 300,350 T500,350 T700,350 T900,350 T1100,350"
          fill="none" stroke="#a78bfa" stroke-width="4" opacity="0.5"/>
  </g>

  <!-- Frequency bars -->
  <g fill="url(#accentGrad)" opacity="0.7" transform="translate(150, 100)">
    <rect x="0" y="300" width="40" height="80" rx="4"/>
    <rect x="60" y="250" width="40" height="130" rx="4"/>
    <rect x="120" y="200" width="40" height="180" rx="4"/>
    <rect x="180" y="230" width="40" height="150" rx="4"/>
    <rect x="240" y="270" width="40" height="110" rx="4"/>
    <rect x="300" y="220" width="40" height="160" rx="4"/>
    <rect x="360" y="180" width="40" height="200" rx="4"/>
    <rect x="420" y="250" width="40" height="130" rx="4"/>
    <rect x="480" y="280" width="40" height="100" rx="4"/>
    <rect x="540" y="260" width="40" height="120" rx="4"/>
    <rect x="600" y="300" width="40" height="80" rx="4"/>
    <rect x="660" y="320" width="40" height="60" rx="4"/>
    <rect x="720" y="340" width="40" height="40" rx="4"/>
    <rect x="780" y="350" width="40" height="30" rx="4"/>
  </g>

  <!-- Title area -->
  <text x="600" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">WebGPU FFT</text>
  <text x="600" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#a78bfa" text-anchor="middle">GPU-Accelerated Fast Fourier Transform Library</text>

  <!-- Features -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="white" opacity="0.9">
    <text x="300" y="580" text-anchor="middle">⚡ Up to 92x Faster</text>
    <text x="600" y="580" text-anchor="middle">🔷 TypeScript First</text>
    <text x="900" y="580" text-anchor="middle">📦 Zero Dependencies</text>
  </g>

  <!-- GPU Chip icon -->
  <g transform="translate(1050, 30)">
    <rect x="0" y="0" width="100" height="75" rx="8" fill="#4f46e5" opacity="0.8"/>
    <rect x="10" y="10" width="80" height="55" rx="4" fill="#1e1b4b"/>
    <circle cx="50" cy="37" r="20" fill="url(#accentGrad)"/>
    <text x="50" y="43" font-family="system-ui, sans-serif" font-size="12" font-weight="bold" fill="white" text-anchor="middle">GPU</text>
  </g>
</svg>
