<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8ecf00"/>
      <stop offset="100%" stop-color="#76b900"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Hexagon chip outline -->
  <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="none" stroke="url(#g)" stroke-width="3" filter="url(#glow)"/>
  <!-- Inner circuit traces -->
  <line x1="50" y1="25" x2="50" y2="45" stroke="#76b900" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="55" x2="65" y2="55" stroke="#76b900" stroke-width="2" opacity="0.8"/>
  <line x1="35" y1="55" x2="35" y2="72" stroke="#76b900" stroke-width="2" opacity="0.6"/>
  <line x1="65" y1="55" x2="65" y2="72" stroke="#76b900" stroke-width="2" opacity="0.6"/>
  <!-- FFT wave node -->
  <circle cx="50" cy="45" r="6" fill="#76b900" filter="url(#glow)"/>
  <!-- Butterfly wing hint -->
  <path d="M 30 35 Q 40 25 50 35 Q 60 25 70 35" fill="none" stroke="#00c3ff" stroke-width="1.5" opacity="0.7"/>
  <path d="M 30 65 Q 40 75 50 65 Q 60 75 70 65" fill="none" stroke="#00c3ff" stroke-width="1.5" opacity="0.7"/>
</svg>
